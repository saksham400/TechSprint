<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillForge - Admin Console</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.4;
            z-index: -1;
            animation: drift 20s infinite alternate ease-in-out;
        }

        .blob-1 {
            background: #60a5fa;
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .blob-2 {
            background: #f472b6;
            bottom: -10%;
            right: -10%;
            animation-delay: -5s;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(40px, -40px) scale(1.1);
            }
        }

        .animate-enter {
            opacity: 0;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-slate-100 relative overflow-hidden text-slate-800 min-h-screen flex items-center justify-center">

    <!-- Success Toast Notification (Hidden Off-Screen initially) -->
    <div id="successToast"
        class="fixed top-[-100px] left-1/2 transform -translate-x-1/2 bg-white border-l-4 border-green-500 shadow-2xl rounded-r-lg p-4 flex items-center gap-4 transition-all duration-500 ease-in-out z-50 min-w-[350px]">
        <div class="bg-green-100 p-2 rounded-full text-green-600">
            <i data-lucide="check-circle" class="w-6 h-6"></i>
        </div>
        <div>
            <h4 class="font-bold text-slate-800">Login Successful</h4>
            <p class="text-sm text-slate-500">Redirecting to Admin Dashboard...</p>
        </div>
    </div>

    <!-- Background -->
    <div class="blob blob-1 w-[600px] h-[600px] rounded-full"></div>
    <div class="blob blob-2 w-[600px] h-[600px] rounded-full"></div>

    <div class="absolute top-8 left-8 animate-enter">
        <a href="index.html"
            class="flex items-center gap-2 text-slate-600 hover:text-slate-900 transition-colors group">
            <div class="bg-white p-2 rounded-lg shadow-sm border border-slate-200 group-hover:border-slate-300">
                <i data-lucide="arrow-left" class="h-5 w-5"></i>
            </div>
            <span class="font-medium text-sm">Back to Portal</span>
        </a>
    </div>

    <!-- Login Card -->
    <main class="w-full max-w-md px-6">
        <div class="glass-panel rounded-2xl p-10 shadow-2xl animate-enter" style="animation-delay: 0.1s;">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-slate-900 rounded-xl shadow-lg mb-4">
                    <i data-lucide="shield-check" class="h-7 w-7 text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">Admin Access</h1>
                <p class="text-sm text-slate-500 mt-2">Powered by Firebase Security</p>
            </div>

            <form class="space-y-5" onsubmit="event.preventDefault(); handleFirebaseLogin();">
                <div>
                    <label
                        class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Email</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-3.5 h-5 w-5 text-slate-400"></i>
                        <input type="email" id="email" required placeholder="admin@college.edu"
                            class="w-full pl-10 pr-4 py-3 bg-white/50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-900 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label
                        class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-3.5 h-5 w-5 text-slate-400"></i>
                        <input type="password" id="password" required placeholder="••••••••••••"
                            class="w-full pl-10 pr-12 py-3 bg-white/50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-slate-900 outline-none transition-all">
                    </div>
                </div>

                <button type="submit" id="loginBtn"
                    class="w-full py-3 px-4 bg-slate-900 hover:bg-slate-800 text-white font-semibold rounded-lg shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2">
                    <span>Sign In</span>
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>

            <div class="mt-6 text-center">
                <p id="errorMessage" class="text-sm text-red-500 hidden"></p>
            </div>
        </div>
    </main>

    <!-- FIREBASE SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        lucide.createIcons();

        // ----------------------------------------------------
        // IMPORTANT: PASTE YOUR FIREBASE CONFIG KEYS HERE AGAIN
        // ----------------------------------------------------
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyBpAWBzA5mF5_s8zcBqsQvjFpoyfzRM-aA",
            authDomain: "techsprint-40240.firebaseapp.com",
            projectId: "techsprint-40240",
            storageBucket: "techsprint-40240.firebasestorage.app",
            messagingSenderId: "692880588949",
            appId: "1:692880588949:web:f05f84c69d97511ca6db9c",
            measurementId: "G-50VW6Z2DZ7"
        };

        // Initialize
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();

        // --- Handle Login ---
        function handleFirebaseLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            const toast = document.getElementById('successToast');

            // 1. Loading UI
            errorMsg.classList.add('hidden');
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="animate-spin w-5 h-5"></i> Authenticating...`;
            lucide.createIcons();
            btn.disabled = true;

            // 2. Auth Request
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // --- SUCCESS SCENARIO ---

                    // A. Update Button
                    btn.classList.remove('bg-slate-900', 'hover:bg-slate-800');
                    btn.classList.add('bg-green-600', 'hover:bg-green-700');
                    btn.innerHTML = `<i data-lucide="check" class="w-5 h-5"></i> Verified`;
                    lucide.createIcons();

                    // B. Show Custom Toast (Slide Down)
                    // Change top position from -100px to 24px (top-6)
                    toast.style.top = "24px";

                    // C. Redirect after short delay
                    setTimeout(() => {
                        // Change this URL to your actual dashboard file
                        window.location.href = "dashboard.html"; 
                        console.log("Redirecting to Admin Dashboard...");
                    }, 2000);
                })
                .catch((error) => {
                    // --- ERROR SCENARIO ---
                    console.error(error);

                    // Reset Button
                    btn.disabled = false;
                    btn.classList.remove('bg-green-600', 'hover:bg-green-700');
                    btn.classList.add('bg-slate-900', 'hover:bg-slate-800');
                    btn.innerHTML = originalBtnText;
                    lucide.createIcons();

                    // Show Error Message
                    errorMsg.innerText = getFriendlyErrorMessage(error.code);
                    errorMsg.classList.remove('hidden');

                    // Shake Animation for visual feedback
                    const panel = document.querySelector('.glass-panel');
                    panel.classList.add('animate-pulse');
                    setTimeout(() => panel.classList.remove('animate-pulse'), 500);
                });
        }

        function getFriendlyErrorMessage(errorCode) {
            switch (errorCode) {
                case 'auth/user-not-found': return "No admin account found with this email.";
                case 'auth/wrong-password': return "Incorrect password. Please try again.";
                case 'auth/invalid-email': return "That email address doesn't look right.";
                case 'auth/too-many-requests': return "Too many attempts. Try again later.";
                default: return "Login failed. Please check your connection.";
            }
        }
    </script>
</body>

</html>
