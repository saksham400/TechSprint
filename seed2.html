<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-xl shadow-xl max-w-5xl w-full grid md:grid-cols-3 gap-8">
        
        <!-- 1. Random Students -->
        <div class="space-y-4 border-r border-slate-200 pr-6">
            <h2 class="text-lg font-bold text-slate-700">1. Random Data</h2>
            <p class="text-xs text-slate-500">General testing data.</p>
            <button onclick="generateStudents()" class="w-full py-2 bg-slate-200 hover:bg-slate-300 rounded text-sm font-medium">Generate Random</button>
            <p id="statusStudent" class="text-xs text-slate-500"></p>
        </div>

        <!-- 2. Teachers -->
        <div class="space-y-4 border-r border-slate-200 pr-6">
            <h2 class="text-lg font-bold text-slate-700">2. Teachers</h2>
            <p class="text-xs text-slate-500">Create Admin IDs.</p>
            <button onclick="generateTeachers()" class="w-full py-2 bg-slate-200 hover:bg-slate-300 rounded text-sm font-medium">Generate Teachers</button>
            <p id="statusTeacher" class="text-xs text-slate-500"></p>
        </div>

        <!-- 3. PIET SPECIFIC STUDENTS -->
        <div class="space-y-4">
            <h2 class="text-lg font-bold text-blue-700">3. PIET Students</h2>
            <p class="text-xs text-slate-500">Generates IDs like <br><span class="font-mono bg-slate-100 p-1">22001.cse@pietgroup.co.in</span></p>
            
            <div class="space-y-2">
                <input type="text" id="batchYear" value="2024" placeholder="Batch Year" class="w-full p-2 border rounded text-xs">
                <select id="branchSelect" class="w-full p-2 border rounded text-xs">
                    <option value="cse">CSE</option>
                    <option value="ece">ECE</option>
                    <option value="mech">MECH</option>
                    <option value="it">IT</option>
                </select>
            </div>

            <button onclick="generatePietStudents()" class="w-full py-2 bg-blue-600 text-white hover:bg-blue-700 rounded text-sm font-medium">
                Create 5 PIET Students
            </button>
            <div id="statusPiet" class="text-xs text-slate-600 h-20 overflow-y-auto mt-2"></div>
        </div>
    </div>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // PASTE YOUR KEYS HERE
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBpAWBzA5mF5_s8zcBqsQvjFpoyfzRM-aA",
  authDomain: "techsprint-40240.firebaseapp.com",
  projectId: "techsprint-40240",
  storageBucket: "techsprint-40240.firebasestorage.app",
  messagingSenderId: "692880588949",
  appId: "1:692880588949:web:f05f84c69d97511ca6db9c",
  measurementId: "G-50VW6Z2DZ7"
};

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 3. GENERATE PIET STUDENTS
        async function generatePietStudents() {
            const batchYear = document.getElementById('batchYear').value; // e.g., 22001
            const branch = document.getElementById('branchSelect').value; // e.g., cse
            const statusBox = document.getElementById('statusPiet');
            
            let batch = db.batch();
            let log = "";
            
            // Create 5 students
            for(let i=1; i<=5; i++) {
                // Format: 22001.cse@pietgroup.co.in
                const rollNo = parseInt(batchYear) * 100 + i; 
                const email = `${rollNo}.${branch}@pietgroup.co.in`;
                
                const ref = db.collection('students').doc(email); // Using email as Doc ID for easy lookup
                batch.set(ref, {
                    name: `PIET Student ${i}`,
                    email: email,
                    college: 'PIET',
                    track: branch === 'cse' ? 'Full Stack Dev' : 'Core Engineering',
                    status: 'Active',
                    joinedAt: new Date().toISOString()
                });

                log += `<div>${email}</div>`;
            }

            try {
                await batch.commit();
                statusBox.innerHTML = log + "<b class='text-green-600'>Created! Pass: password123</b><br><i class='text-[10px] text-red-500'>Don't forget to create these in Auth Console!</i>";
            } catch (e) {
                statusBox.innerText = "Error: " + e.message;
            }
        }

        // ... (Keep generateStudents and generateTeachers functions from previous code here if needed)
        async function generateStudents() { /* ... Previous Code ... */ }
        // async function generateTeachers() { /* ... Previous Code ... */ }
    </script>
</body>
</html>
